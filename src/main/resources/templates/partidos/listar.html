<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>DunkBet - Lista de Partidos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h2>Partidos de la NBA Disponibles</h2>
    <p class="text-secondary">Selecciona un partido abierto para registrar tu apuesta.</p>
    <hr>

    <table class="table">
        <thead class="table-dark">
            <tr>
                <th>Equipo Local</th>
                <th>Equipo Visitante</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Lugar</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="partido : ${partidos}">
                <td th:text="${partido.equipoLocal}"></td>
                <td th:text="${partido.equipoVisitante}"></td>
                <td th:text="${partido.fecha}"></td>
                <td th:text="${partido.hora}"></td>
                <td th:text="${partido.lugar}"></td>
                <td th:text="${partido.estado}"></td>
                <td>
                    <a th:href="@{/apuestas/nueva(partidoId=${partido.idPartido})}" class="btn btn-sm btn-success">
                    Apostar
                    </a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="mt-4">
        <a th:href="@{/index}" class="btn btn-secondary">Volver al Inicio</a>
    </div>

</body>
</html>
