<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" th:href="@{/assets/icono.ico}" type="image/x-icon">
    <meta charset="UTF-8">
    <title>DunkBet - Cerrar Partido</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h2>Cerrar Partido y Registrar Marcador</h2>
    <p class="text-secondary">Ingresa los puntos finales de cada equipo para finalizar el encuentro y evaluar las apuestas.</p>
    <hr>

    <form th:action="@{/admin/partidos/cerrar}" method="POST" class="row g-3">
        
        <input type="hidden" name="partidoId" th:value="${partido.idPartido}">

        <h3>Información del Encuentro</h3>
        
        <div class="col-md-6">
            <label class="form-label fw-bold">Equipo Local</label>
            <input type="text" class="form-control-plaintext fs-5 text-primary fw-semibold" 
                   th:value="${partido.equipoLocal}" readonly>
        </div>

        <div class="col-md-6">
            <label class="form-label fw-bold">Equipo Visitante</label>
            <input type="text" class="form-control-plaintext fs-5 text-primary fw-semibold" 
                   th:value="${partido.equipoVisitante}" readonly>
        </div>

        <h3 class="mt-4">Marcador Final</h3>

        <div class="col-md-6">
            <label class="form-label">Puntos Equipo Local</label>
            <input type="number" name="puntosLocal" class="form-control" placeholder="Ej: 112" min="0" required>
        </div>

        <div class="col-md-6">
            <label class="form-label">Puntos Equipo Visitante</label>
            <input type="number" name="puntosVisitante" class="form-control" placeholder="Ej: 105" min="0" required>
        </div>

        <div class="col-12 mt-4">
            <button type="submit" class="btn btn-danger">Finalizar Encuentro</button>
            <a th:href="@{/index}" class="btn btn-secondary">Regresar</a>
        </div>
    </form>

</body>
</html>
