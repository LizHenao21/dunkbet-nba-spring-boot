<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" th:href="@{/assets/icono.ico}" type="image/x-icon">
    <meta charset="UTF-8">
    <title>DunkBet - Nueva Apuesta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container my-5" style="background-color: #f8f9fa; color: #333;">

    <div class="mb-4">
        <h2 class="fw-bold m-0">Registrar Nueva Apuesta</h2>
        <p class="text-muted small m-0">Completa tus datos para guardar tu apuesta en el sistema (Procesado 100% en Servidor).</p>
    </div>

    <div class="card border-0 shadow-sm mb-4" th:if="${partido != null}">
        <div class="card-body text-center py-3 bg-white rounded">
            <span class="text-uppercase text-muted tracking-wider small d-block mb-1">Partido Seleccionado</span>
            <h5 class="fw-bold text-dark m-0 mb-1" th:text="${partido.equipoLocal + ' vs ' + partido.equipoVisitante}"></h5>
            <p class="mb-0 text-muted small" th:text="'Lugar: ' + ${partido.lugar} + '  |  Fecha: ' + ${partido.fecha} + ' ' + ${partido.hora}"></p>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-danger border-0 shadow-sm mb-4" th:text="${error}"></div>

    <form th:action="@{/apuestas/nueva}" method="POST">
        
        <input type="hidden" name="partidoId" th:value="${partido != null ? partido.idPartido : (param.partidoId != null ? param.partidoId : '')}">

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-3 text-dark fs-5">Datos Personales</h4>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label text-secondary small fw-semibold">Nombre Completo</label>
                        <input type="text" name="nombre" th:value="${param.nombre}" class="form-control form-control-sm" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-secondary small fw-semibold">Tipo de Identificación</label>
                        <select name="tipoIdentificacion" class="form-select form-select-sm" required>
                            <option value="CC" th:selected="${param.tipoIdentificacion == 'CC'}">Cédula de Ciudadanía (CC)</option>
                            <option value="CE" th:selected="${param.tipoIdentificacion == 'CE'}">Cédula de Extranjería (CE)</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-secondary small fw-semibold">Número de Documento</label>
                        <input type="text" name="documento" th:value="${param.documento}" class="form-control form-control-sm" pattern="[0-9]+" title="Solo se permiten números" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-secondary small fw-semibold">Edad</label>
                        <input type="number" name="edad" th:value="${param.edad}" class="form-control form-control-sm" min="18" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-secondary small fw-semibold">Correo Electrónico</label>
                        <input type="email" name="email" th:value="${param.email}" class="form-control form-control-sm" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-secondary small fw-semibold">Teléfono</label>
                        <input type="text" name="telefono" th:value="${param.telefono}" class="form-control form-control-sm" required>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm mb-4">
            <div class="card-body p-4">
                <h4 class="fw-bold mb-3 text-dark fs-5">Datos de la Apuesta</h4>
                
                <div class="row g-3 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label text-secondary small fw-semibold">Tipo de Apuesta</label>
                        <select name="tipoApuesta" class="form-select form-select-sm" required onchange="this.form.submit();">
                            <option value="GANADOR" th:selected="${tipoApuesta == 'GANADOR'}">Ganador del Partido</option>
                            <option value="PUNTOS" th:selected="${tipoApuesta == 'PUNTOS'}">Total de Puntos</option>
                        </select>
                    </div>

                    <div class="col-md-3" th:if="${tipoApuesta == 'GANADOR'}">
                        <label class="form-label text-secondary small fw-semibold">Selecciona tu Equipo (Predicción)</label>
                        <select name="prediccionEquipo" class="form-select form-select-sm fw-bold text-primary" required>
                            <option value="" disabled th:selected="${prediccion == null}">-- Elegir Equipo --</option>
                            <option th:value="${partido.equipoLocal}" th:text="${partido.equipoLocal}" th:selected="${#strings.equals(prediccion, partido.equipoLocal)}"></option>
                            <option th:value="${partido.equipoVisitante}" th:text="${partido.equipoVisitante}" th:selected="${#strings.equals(prediccion, partido.equipoVisitante)}"></option>
                        </select>
                    </div>

                    <div class="col-md-3" th:if="${tipoApuesta == 'PUNTOS'}">
                        <label class="form-label text-secondary small fw-semibold">Cantidad de Puntos (Predicción)</label>
                        <input type="number" name="prediccionPuntos" th:value="${prediccion}" class="form-control form-control-sm fw-bold text-success" placeholder="Ej: 220" min="1" required>
                    </div>

                    <div class="col-md-3">
                        <label class="form-label text-secondary small fw-semibold">Monto de Dinero ($)</label>
                        <input type="number" name="monto" th:value="${monto}" class="form-control form-control-sm" min="1" step="0.01" required>
                    </div>

                    <div class="col-md-3">
                        <button type="submit" name="accion" value="actualizar" class="btn btn-sm btn-dark w-100 py-2">Calcular Ganancia</button>
                    </div>
                </div>

                <div class="row mt-3">
                    <div class="col-12">
                        <div class="p-3 bg-light border rounded d-flex justify-content-between align-items-center">
                            <span class="text-muted small fw-semibold">Ganancia Potencial Bruta</span>
                            <strong class="text-success fs-5" th:text="'$ ' + ${ganancia != null ? ganancia : '0.00'}">$ 0.00</strong>
                        </div>
                    </div>
                </div>
                
            </div>
        </div>

        <div class="d-flex gap-2 justify-content-end">
            <a th:href="@{/index}" class="btn btn-sm btn-outline-secondary px-3 py-2">Regresar</a>
            <button type="submit" th:formaction="@{/apuestas/guardar}" name="accion" value="guardar" class="btn btn-sm btn-success px-4 py-2 shadow-sm">Confirmar y Guardar Apuesta</button>
        </div>
    </form>

</body>
</html>
