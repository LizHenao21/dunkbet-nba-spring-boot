<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" th:href="@{/assets/icono.ico}" type="image/x-icon">
    <meta charset="UTF-8">
    <title>DunkBet - Historial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h2>Consultar Historial de Apuestas</h2>
    <p class="text-secondary">Escribe tu número de documento para ver tus apuestas registradas.</p>
    <hr>

    <form th:action="@{/apuestas/historial}" method="GET" class="row g-2 mb-4">
        <div class="col-md-8">
            <input type="number" name="documento" class="form-control" placeholder="Número de cédula..." th:value="${documentoBuscado}" required>
        </div>
        <div class="col-md-4">
            <button type="submit" class="btn btn-primary w-100">Buscar</button>
        </div>
    </form>

    <table class="table" th:if="${apuestas != null}">
        <thead class="table-dark">
            <tr>
                <th>Partido</th>
                <th>Tipo</th>
                <th>Predicción</th>
                <th>Monto</th>
                <th>Estado</th>
                <th>Ganancia</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="apuesta : ${apuestas}">
                <td th:text="${apuesta.partido.equipoLocal} + ' vs ' + ${apuesta.partido.equipoVisitante}"></td>
                <td th:text="${apuesta.tipo}"></td>
                <td th:text="${apuesta.prediccion}"></td>
                <td th:text="'$' + ${apuesta.monto}"></td>
                <td th:text="${apuesta.estado}"></td>
                <td th:text="'$' + ${apuesta.ganancia}"></td>
            </tr>
        </tbody>
    </table>

    <div class="mt-4">
        <a th:href="@{/index}" class="btn btn-secondary">Volver al Inicio</a>
    </div>

</body>
</html>
